<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M3U Player</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./styles.css">

  <!-- HLS.js untuk play m3u8 -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

<header>
  <h1>M3U to JSON Player</h1>
</header>

<main class="container">

  <input type="text" id="m3uUrl" placeholder="Masukkan URL M3U">
  <button id="loadBtn">Load dari URL</button>

  <input type="file" id="fileInput" accept=".m3u,.m3u8">

  <section class="card">
    <h3>Playlist</h3>
    <div id="playlist"></div>
  </section>

  <section class="card">
    <video id="video" controls></video>
    <div class="controls">
      <button id="prevBtn">Prev</button>
      <button id="nextBtn">Next</button>
    </div>
  </section>

</main>

<script src="./app.js"></script>
</body>
</html>
