<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M3U CHECKER</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./styles.css">

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

<header>
  <h1>M3U CHECKER</h1>
</header>

<main class="container">

  <input type="text" id="m3uUrl" placeholder="Masukkan URL M3U">
  <button id="loadBtn">Load dari URL</button>
  <input type="file" id="fileInput" accept=".m3u,.m3u8">

  <!-- PLAYER DI ATAS -->
  <section class="card">

  <video id="video" controls autoplay></video>

  <div class="status" id="streamStatus">
    Status: -
  </div>

  <div class="stream-link-row">
    <div id="streamLink" class="stream-link"></div>
  </div>

  <button id="copyBtn">Copy Link</button>

  <div class="controls">
    <button id="prevBtn">Prev</button>
    <button id="nextBtn">Next</button>
  </div>

</section>

  <!-- PLAYLIST DI BAWAH -->
  <section class="card">
    <h3>Playlist</h3>
    <div id="playlist"></div>
  </section>

</main>

<script src="./app.js"></script>
</body>
</html>
